packages:
  - "packages/**"
  - "playground"
  - "!**/test/**"

catalog:
  "@preact/signals-core": 1.14.1

  # Dev Dependencies
  "@changesets/cli": ^2.31.0
  "@eslint/js": ^9.39.4
  "@mdi/font": ^7.4.47
  "@types/node": ^22.19.17
  "@vitejs/plugin-vue": ^6.0.6
  concurrently: ^9.2.1
  esbuild: ^0.28.0
  eslint: ^9.39.4
  eslint-config-prettier: ^10.1.8
  eslint-plugin-headers: 1.3.4
  eslint-plugin-vue: ^10.8.0
  happy-dom: ^20.9.0
  husky: ^9.1.7
  lint-staged: ^16.4.0
  prettier: ^3.8.3
  rimraf: ^6.1.3
  tsx: ^4.21.0
  typedoc: ^0.28.19
  typescript: ^6.0.3
  typescript-eslint: ^8.58.2
  vite: ^7.3.2
  vitest: ^4.1.4
  vue: ^3.5.32
  vue-eslint-parser: ^10.4.0
  vuetify: ^3.12.5

overrides:
  "rollup@>=4.0.0 <4.59.4": ">=4.59.0"
  "cross-spawn@<7.0.5": ">=7.0.5"
  '@eslint/plugin-kit@<0.2.3': '>=0.2.3'
  '@eslint/plugin-kit@<0.3.4': '>=0.3.4'
  "esbuild@<0.25.0": ">=0.25.0"
  "@babel/runtime@<7.26.10": ">=7.26.10"
  "brace-expansion@>=1.0.0 <=1.1.11": "^1.1.12"
  "brace-expansion@>=2.0.0 <=2.0.1": "^2.0.2"
  "tmp@<=0.2.3": "^0.2.4"
  "minimatch@<3.1.3": "^3.1.3"
  "minimatch@>=9.0.0 <9.0.7": "^9.0.7"
  "markdown-it@>=13.0.0 <14.1.1": "^14.1.1"
  "ajv@<6.14.0": "^6.14.0"
  "picomatch@<2.3.2": "^2.3.2"
  "picomatch@>=4.0.0 <4.0.4": "^4.0.4"
  "flatted@<=3.4.1": "^3.4.2"
  "yaml@>=2.0.0 <2.8.3": "^2.8.3"

peerDependencyRules:
  allowedVersions:
    typescript: "*"

auditConfig:
  ignoreCves:
    - CVE-2026-33750 # https://github.com/advisories/GHSA-f886-m6hf-6m8v

onlyBuiltDependencies:
  - esbuild

minimumReleaseAge: 4320 # 3 days in minutes
minimumReleaseAgeExclude:
  - "@open-pioneer/*"
  - "@conterra/*"
  - happy-dom@20.8.9
  - vite@7.3.2

# Don't automatically link to workspace packages.
# One must use the explicit `workspace:...` protocol instead.
#
# https://pnpm.io/npmrc#link-workspace-packages
linkWorkspacePackages: false

autoInstallPeers: true
dedupePeerDependents: true
strictPeerDependencies: true
